{% extends "base.html" %}
{% block content %}
<section class="picker">
  <h1>Choose a household</h1>
  <div class="home-grid">
    {% for h in homes %}
    <a class="home-card" href="/h/{{ h.household_id }}">
      <span class="home-id">{{ h.household_id }}</span>
      <span class="home-name">{{ h.name }}</span>
      <span class="home-meta">{{ h.city }} · {{ h.tariff_id }} tariff</span>
    </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
